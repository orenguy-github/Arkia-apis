services:
  - type: web
    name: api-arkia
    runtime: node
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTOMATION_URL
        sync: false
      - key: AUTOMATION_USER
        sync: false
      - key: AUTOMATION_PASS
        sync: false
